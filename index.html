/* NAVBAR */

  justify-content: space-between;
  padding: 15px;

nav a {

  border-radius: 10px;
}

/* FOOTER */
footer {
  background: #222;
  color: white;
  padding: 20px;
}

/* WA FLOAT */
.wa {
  position: fixed;
  bottom: 15px;
  right: 15px;
  background: #25D366;
  color: white;
  padding: 12px;
  border-radius: 50%;
  text-decoration: none;
}

/* RESPONSIVE */
@media (min-width: 768px) {
  .hero h1 {
    font-size: 40px;
  }
}
</style>
</head>
